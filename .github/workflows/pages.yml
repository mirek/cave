name: Deploy website

on:
  push:
    branches:
      - main
    paths:
      - 'website/**'
      - 'packages/**'
      - '*.md'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6

      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24.18.0
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Cache verified grammar archives
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: ~/.cache/cave/grammar-toolchain/downloads
          key: grammar-toolchain-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('scripts/grammar-toolchain.json') }}

      - name: Generate tree-sitter artifacts
        run: pnpm --filter @cavelang/tree-sitter-cave build

      - run: pnpm site:build

      - name: Install the browser runtime
        run: pnpm --filter @cavelang/website exec playwright install --with-deps chromium

      - name: Exercise the production website
        run: pnpm --filter @cavelang/website test:browser

      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4
        with:
          path: website/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
