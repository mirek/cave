name: Build CAVE book

on:
  push:
    paths:
      - 'book/**'
      - '.github/workflows/book.yml'
  pull_request:
    paths:
      - 'book/**'
      - '.github/workflows/book.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Install Typst 0.15.0
        uses: typst-community/setup-typst@v5
        with:
          typst-version: 0.15.0

      - name: Verify Typst version
        run: |
          case "$(typst --version)" in
            "typst 0.15.0"*) ;;
            *) exit 1 ;;
          esac

      - name: Install PDF validation tools
        run: |
          sudo apt-get update
          sudo apt-get install --yes poppler-utils

      - name: Build and validate
        run: sh book/build.sh

      - name: Check in generated PDF
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add website/public/cave-book.pdf
          if ! git diff --cached --quiet; then
            git commit -m "Build CAVE book PDF"
            branch="${GITHUB_HEAD_REF:-$GITHUB_REF_NAME}"
            git push origin "HEAD:$branch"
          fi
