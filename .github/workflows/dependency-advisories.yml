name: Production dependency advisories

on:
  schedule:
    - cron: '17 5 * * 1-5'
  workflow_dispatch:
  pull_request:
    paths:
      - '**/package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.github/dependabot.yml'
      - '.github/workflows/**'

permissions:
  contents: read

concurrency:
  group: dependency-advisories-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6

      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24.18.0
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Audit production dependencies
        id: audit
        continue-on-error: true
        run: pnpm audit --prod --audit-level=low

      - name: Report advisory ownership
        if: steps.audit.outcome == 'failure'
        run: |
          echo "::error title=Production dependency advisory::Owner @mirek: triage the pnpm audit findings using DEPENDENCY-MAINTENANCE.md."
          {
            echo '## Production dependency advisory'
            echo ''
            echo 'Owner: @mirek'
            echo ''
            echo 'Triage and escalation policy: DEPENDENCY-MAINTENANCE.md.'
            echo 'Review the audit output above, then patch, defer with a tracked deadline, or document a time-bounded ignore.'
          } >> "$GITHUB_STEP_SUMMARY"
          exit 1
