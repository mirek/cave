name: Publish

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 26
          registry-url: https://registry.npmjs.org
          package-manager-cache: false # never use caching in release builds

      - run: pnpm install --frozen-lockfile

      # Generated grammar artifacts (parser.c, WASM) are never committed —
      # tree-sitter-cli (a devDependency) regenerates them here; its
      # `build --wasm` downloads wasi-sdk into ~/.cache/tree-sitter on
      # first use, so no extra toolchain setup is needed.
      - run: pnpm --filter @cavelang/tree-sitter-cave build

      - run: pnpm build

      - run: pnpm test

      - name: Set version from tag (single-version monorepo)
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Publishing version ${VERSION}"
          npm pkg set version="${VERSION}"
          for pkg in packages/*/package.json; do
            npm pkg set version="${VERSION}" --prefix "$(dirname "$pkg")"
          done

      - name: Copy license into packages
        run: |
          for dir in packages/*/; do
            cp License.md "$dir"
          done

      # Auth via OIDC trusted publishing (id-token: write above) — no npm
      # token; each @cavelang package must have this repo/workflow configured
      # as a trusted publisher on npmjs.com. Provenance is automatic.
      - name: Publish to npm
        run: pnpm -r publish --access public --no-git-checks
