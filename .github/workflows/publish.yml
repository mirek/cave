name: Publish

# Changesets release automation. On every push to main:
#   - pending .changeset/*.md files → opens/updates the
#     `chore(release): version packages` PR (branch changeset-release/main),
#     which bumps every version source in lockstep;
#   - no pending changesets → runs scripts/release-publish.sh, which is a
#     no-op when the current version is already on npm, and otherwise
#     builds, tests, smoke-checks the packed artifacts, publishes all packages,
#     and tags v<version>.
#
# npm auth is OIDC trusted publishing (id-token: write) — no npm token;
# each @cavelang package has this repo + THIS WORKFLOW FILENAME
# (publish.yml) configured as a trusted publisher on npmjs.com, so don't
# rename this file. Provenance is automatic. First-time publishes of new
# packages still need `make publish` from a machine with npm auth, since
# trusted publishing can only be configured on packages that already exist
# on the registry. Do not use `npm publish` for that bootstrap: pnpm applies
# the production export/bin overrides stored in publishConfig.

on:
  push:
    branches:
      - main

permissions:
  contents: write # push the changeset-release branch and the v<version> tag
  pull-requests: write # open/update the version packages PR
  id-token: write # npm OIDC trusted publishing

concurrency:
  group: publish-main
  cancel-in-progress: false # never cancel a run that may be mid-publish

jobs:
  # Validate the route to a version PR, or the exact publish identity, before
  # npm registry setup grants the publish process an authentication path.
  preflight:
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24.18.0

      - name: Validate version-PR or publish readiness
        run: |
          if git ls-files '.changeset/*.md' | grep -v '^\.changeset/README\.md$' | grep -q .; then
            node scripts/release-validate.mjs --mode=version-pr
          else
            node scripts/release-validate.mjs --mode=publish
          fi

  release:
    needs: preflight
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6

      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24.18.0
          registry-url: https://registry.npmjs.org
          package-manager-cache: false # never use caching in release builds

      - run: pnpm install --frozen-lockfile

      - name: Cache verified grammar archives
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: ~/.cache/cave/grammar-toolchain/downloads
          key: grammar-toolchain-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('scripts/grammar-toolchain.json') }}

      # Note: the version packages PR is opened with GITHUB_TOKEN, so CI
      # does not run on it automatically (GitHub suppresses workflows for
      # events created by the default token). Its diff is only version
      # fields; CI runs on main after merge, and the publish path below
      # builds and tests before anything ships. If branch protection ever
      # requires checks on that PR, give this step a PAT or GitHub App
      # token instead.
      - uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1
        with:
          version: pnpm run version-packages
          publish: pnpm run release:publish
          commit: 'chore(release): version packages'
          title: 'chore(release): version packages'
          createGithubReleases: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
