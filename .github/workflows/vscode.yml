name: Publish VS Code extension

on:
  workflow_dispatch:
    inputs:
      version:
        description: Existing CAVE release version to publish (without v)
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: vscode-marketplace-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  publish:
    environment: vscode-marketplace
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          ref: refs/tags/v${{ inputs.version }}
          fetch-depth: 0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6

      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24.18.0
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Validate tag and lockstep release identity
        run: node scripts/release-validate.mjs --mode=publish

      - name: Package and validate the VSIX
        run: pnpm --filter cave-language package

      - name: Publish the validated VSIX to Marketplace
        working-directory: editors/vscode
        env:
          RELEASE_VERSION: ${{ inputs.version }}
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: pnpm exec vsce publish --packagePath "cave-language-${RELEASE_VERSION}.vsix" --skip-duplicate
