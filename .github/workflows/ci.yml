name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Every PR must add a changeset (see CLAUDE.md) — uniquely named files
  # under .changeset/ replace the old lockstep version bumps that made
  # concurrent PRs conflict. The automated version packages PR is the one
  # exception: it consumes changesets rather than adding them.
  changeset:
    if: github.event_name == 'pull_request' && !startsWith(github.head_ref, 'changeset-release/')
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Require a changeset
        run: |
          added="$(git diff --name-only --diff-filter=A "origin/${{ github.base_ref }}...HEAD" -- '.changeset/*.md' | grep -v '^\.changeset/README\.md$' || true)"
          if [ -z "$added" ]; then
            echo "::error::This PR adds no changeset. Add a file like .changeset/<slug>.md:"
            echo ''
            echo '  ---'
            echo '  "@cavelang/core": patch'
            echo '  ---'
            echo ''
            echo '  One-line summary of the change.'
            echo ''
            echo "patch = fixes/docs, minor = new features or spec/semantic changes; see CLAUDE.md."
            exit 1
          fi
          echo "changesets added:"
          echo "$added"

  suite:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6

      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24.18.0
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Cache verified grammar archives
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: ~/.cache/cave/grammar-toolchain/downloads
          key: grammar-toolchain-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('scripts/grammar-toolchain.json') }}

      - name: Verify committed tree-sitter artifacts
        run: pnpm grammar:verify

      - name: Build the TypeScript project graph from clean outputs
        run: pnpm clean && pnpm build

      - name: Verify an incremental rebuild is a no-op
        run: pnpm build:verify

      - run: pnpm test

      - name: Check representative performance budgets
        run: pnpm bench:performance

      - name: Build website
        run: pnpm site:build

      - name: Verify the default website excludes optional solver assets
        run: node scripts/verify-website-bundle.mjs

  # Exercise the exact minimum runtime, the supported Current line, and every
  # supported OS without multiplying the complete source and website suite.
  # These tests own the platform-sensitive native, path, process-tree, and
  # package-layout paths.
  runtime:
    name: Runtime (${{ matrix.name }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: node-22.18.0 / ubuntu-24.04
            os: ubuntu-24.04
            node: 22.18.0
          - name: node-24.18.0 / macos-15
            os: macos-15
            node: 24.18.0
          - name: node-24.18.0 / windows-2022
            os: windows-2022
            node: 24.18.0
          - name: node-26.4.0 / ubuntu-24.04
            os: ubuntu-24.04
            node: 26.4.0
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6

      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Verify the exact Node runtime
        run: node -e "if (process.version !== 'v${{ matrix.node }}') throw new Error('expected v${{ matrix.node }}, received ' + process.version)"

      - run: pnpm install --frozen-lockfile

      - name: Cache verified grammar archives
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: ~/.cache/cave/grammar-toolchain/downloads
          key: grammar-toolchain-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('scripts/grammar-toolchain.json') }}

      - name: Build and test the native grammar toolchain
        run: pnpm --filter @cavelang/tree-sitter-cave test

      - name: Test process and shell portability
        run: pnpm --filter @cavelang/loop test

      - name: Test the Node SQLite adapter and filesystem behavior
        run: pnpm --filter @cavelang/store test

      - name: Build the consolidated CLI package layout
        run: pnpm --filter @cavelang/cli build

      - name: Verify the built process worker is packaged with the CLI
        run: node -e "if (!require('node:fs').existsSync('packages/cli/dist/internal/loop/process-worker.js')) throw new Error('consolidated process worker is missing')"

      - name: Test CLI paths, shell hooks, and the runtime contract
        run: node --disable-warning=ExperimentalWarning --test packages/cli/test/cli.test.ts packages/cli/test/runtime-contract.test.ts

  # Load the production artifact from the GitHub Pages subpath in a real
  # browser. This owns lazy chunks, module workers, Wasm URLs, and browser
  # diagnostics that source-level tests cannot observe.
  browser:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6

      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24.18.0
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Cache verified grammar archives
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: ~/.cache/cave/grammar-toolchain/downloads
          key: grammar-toolchain-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('scripts/grammar-toolchain.json') }}

      - name: Build the production website
        run: pnpm --filter @cavelang/tree-sitter-cave build && pnpm site:build

      - name: Install the browser runtime
        run: pnpm --filter @cavelang/website exec playwright install --with-deps chromium

      - name: Exercise the production website
        run: pnpm --filter @cavelang/website test:browser

      - name: Retain browser diagnostics
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: browser-smoke-${{ github.sha }}
          path: |
            website/playwright-report
            website/test-results
          if-no-files-found: ignore
          retention-days: 7

  # Pack every public package and install the tarballs into a clean npm
  # project. This catches missing files, broken publishConfig exports, and
  # bin paths that workspace symlinks cannot expose.
  smoke:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6

      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24.18.0
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Cache verified grammar archives
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: ~/.cache/cave/grammar-toolchain/downloads
          key: grammar-toolchain-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('scripts/grammar-toolchain.json') }}

      - name: Test packed npm artifacts
        run: bash scripts/smoke.sh

  # Package the editor product through the Marketplace toolchain and inspect
  # the resulting archive, not just its source bundle.
  vscode:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6

      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24.18.0
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Package and validate the VS Code extension
        run: pnpm --filter cave-language package

      - name: Retain the validated VSIX
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: cave-language-${{ github.sha }}
          path: editors/vscode/cave-language-*.vsix
          if-no-files-found: error
          retention-days: 7

  # Keep CI/test as the stable branch-protection check while running the
  # full source suite and packed-artifact smoke test independently.
  test:
    if: always()
    needs:
      - suite
      - runtime
      - browser
      - smoke
      - vscode
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Require source and artifact checks
        env:
          SUITE_RESULT: ${{ needs.suite.result }}
          RUNTIME_RESULT: ${{ needs.runtime.result }}
          BROWSER_RESULT: ${{ needs.browser.result }}
          SMOKE_RESULT: ${{ needs.smoke.result }}
          VSCODE_RESULT: ${{ needs.vscode.result }}
        run: |
          if [ "$SUITE_RESULT" != success ] || [ "$RUNTIME_RESULT" != success ] || [ "$BROWSER_RESULT" != success ] || [ "$SMOKE_RESULT" != success ] || [ "$VSCODE_RESULT" != success ]; then
            echo "source suite: $SUITE_RESULT" >&2
            echo "runtime matrix: $RUNTIME_RESULT" >&2
            echo "production browser: $BROWSER_RESULT" >&2
            echo "artifact smoke: $SMOKE_RESULT" >&2
            echo "VS Code package: $VSCODE_RESULT" >&2
            exit 1
          fi
